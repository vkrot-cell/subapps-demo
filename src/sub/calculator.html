<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="./calculator.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glass Calculator</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --calc-bg: #ffffff;
            --accent: #4a90e2;
            --text: #333;
            --btn-hover: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background: var(--calc-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 2rem;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            border: none;
            background: #f4f4f4;
            border-radius: 10px;
            box-sizing: border-box;
            color: var(--text);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .operator {
            color: var(--accent);
            font-weight: bold;
        }

        .equals {
            background: var(--accent);
            color: white;
            grid-column: span 2;
        }

        .equals:hover {
            background: #357abd;
        }

        .clear {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled value="0">
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendToDisplay('/')">/</button>
        <button class="operator" onclick="appendToDisplay('*')">×</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendToDisplay('-')">-</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendToDisplay('+')">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('.')">.</button>
        
        <button onclick="appendToDisplay('0')">0</button>
        <button class="equals" onclick="calculate()">=</button>
    </div>
</div>

<script>
    navigator.geolocation.getCurrentPosition((pos) => console.log(pos));

    alert(window.location.search);
    const display = document.getElementById('display');

    function appendToDisplay(input) {
        if (display.value === "0" || display.value === "Error") {
            display.value = input;
        } else {
            display.value += input;
        }
    }

    function clearDisplay() {
        display.value = "0";
    }

    function deleteLast() {
        if (display.value.length > 1) {
            display.value = display.value.slice(0, -1);
        } else {
            display.value = "0";
        }
    }

    function calculate() {
        try {
            // eval() is used here for simplicity in a small local app.
            // In production environments with user-inputted strings, 
            // a dedicated math parser is safer.
            display.value = eval(display.value);
        } catch (error) {
            display.value = "Error";
        }
    }

    // Keyboard support
    document.addEventListener('keydown', (event) => {
        const key = event.key;
        if (/[0-9]/.test(key)) appendToDisplay(key);
        if (['+', '-', '*', '/'].includes(key)) appendToDisplay(key);
        if (key === 'Enter' || key === '=') calculate();
        if (key === 'Backspace') deleteLast();
        if (key === 'Escape') clearDisplay();
    });
</script>

</body>
</html>
