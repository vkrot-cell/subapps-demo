<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/style.css" />
    <script type="module" defer src="/index.ts"></script>
    <link rel="manifest" href="/.well-known/manifest.webmanifest" />
  </head>

  <body>
    <main class="container">
      <h1>Dom's Fantastic IWA</h1>
      <div>
        <p>Let's try to add a sub app.</p>
        <p>Result of each button click can be observed via DevTools console</p>
        <h3>/sub/calculator.html</h3>
        <button id="buttonAddCalculator">add</button>
        <button id="buttonOpenCalculator">open</button>
        <button id="buttonRemoveCalculator">remove</button>

        <h3>/dynamic/word/app.html</h3>
        <button id="buttonAddWord">add</button>
        <button id="buttonOpenWord">open</button>
        <button id="buttonRemoveWord">remove</button>
        <h3>/dynamic/notepad/app.html</h3>
        <button id="buttonAddNotepad">add</button>
        <button id="buttonOpenNotepad">open</button>
        <button id="buttonRemoveNotepad">remove</button>
        <h3>/dynamic/photoshop/app.html</h3>
        <button id="buttonAddPhotoshop">add</button>
        <button id="buttonOpenPhotoshop">open</button>
        <button id="buttonRemovePhotoshop">remove</button>

        <h3>Add all</h3>
        <button id="buttonAddAll">add all</button>
        <button id="buttonRemoveAll">remove all</button>
        <button id="buttonListAll">list all</button>
      </div>
    </main>
  </body>
</html>
